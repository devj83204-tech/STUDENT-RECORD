<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Student Record App Pro - Realtime Sync</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #11998e, #38ef7d); color: white;
            overflow-x: hidden; width: 100vw; min-height: 100vh;
        }
        .light-mode { background: #f4f7f6 !important; color: #2c3e50 !important; }
        .light-mode .page { background: rgba(255, 255, 255, 0.95) !important; color: #2c3e50 !important; }
        .light-mode .icon-box, .light-mode .student-row, .light-mode #rankingBox, .light-mode .calendar-nested-box, .light-mode .stats-widget, .light-mode .search-profile-box {
            background: rgba(0, 0, 0, 0.05); color: #2c3e50; border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        .page { display: none; padding: 15px; width: 100%; min-height: 100vh; position: relative; z-index: 10; }
        .active { display: block; }
        .center { text-align: center; margin-top: 20px; }
        
        .login-bg-effects {
            position: absolute; width: 100%; height: 100%; top:0; left:0; z-index: 1; overflow: hidden; pointer-events: none;
        }
        .circle-effect {
            position: absolute; background: linear-gradient(45deg, #FF416C, #FF4B2B);
            border-radius: 50%; filter: blur(30px); opacity: 0.4; animation: float3d 8s infinite alternate;
        }
        @keyframes float3d { 0% { transform: translateY(0px) scale(1); } 100% { transform: translateY(-40px) scale(1.1); } }
        
        .auth-container {
            max-width: 380px; margin: 40px auto; padding: 30px 25px;
            background: rgba(255, 255, 255, 0.12); border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.25); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.25); position: relative; z-index: 5;
        }
        
        button {
            padding: 12px 18px; margin: 6px; border: none; border-radius: 8px;
            cursor: pointer; font-weight: bold; font-size: 14px;
            display: inline-flex; align-items: center; justify-content: center; gap: 6px;
            transition: 0.2s ease; box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }
        button:active { transform: scale(0.96); }
        .primary { background: #1abc9c; color: white; }
        .success-btn { background: #2ecc71; color: white; }
        .pdf-btn { background: #9b59b6; color: white; }
        .voice-btn { background: #f39c12; color: white; }
        .voice-active { background: #e74c3c !important; color: white !important; }
        .excel-btn { background: #3498db; color: white; }
        .whatsapp-btn { background: #25D366; color: white; }
        .deleteBtn { background: #e74c3c; color: white; }
        .checkedBtn { background: #2ecc71; color: white; }
        .uncheckBtn { background: #e67e22; color: white; }
        .backBtn { background: #34495e; color: white; }
        .toggleFilterBtn { background: #f1c40f; color: black; }
        .modeToggle { position: fixed; top: 15px; right: 15px; z-index: 999; padding: 8px 12px; font-size: 12px; }
        
        .icon-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(145px, 1fr)); gap: 12px; margin-top: 20px; width: 100%; }
        .icon-box {
            background: rgba(255, 255, 255, 0.08); padding: 18px; border-radius: 12px;
            text-align: center; cursor: pointer; display: flex; flex-direction: column;
            justify-content: space-between; align-items: center; gap: 12px; min-height: 120px;
            border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(5px);
        }
        input, select { padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); margin: 6px; color: #333; font-size: 15px; width: 100%; max-width: 100%; }
        select { background: white; color: #333; }
        
        .stats-widget {
            background: rgba(255, 255, 255, 0.12); padding: 14px; border-radius: 10px;
            font-size: 16px; font-weight: bold; margin: 12px auto; max-width: 420px;
            border-left: 5px solid #2ecc71; text-align: center;
        }
        .search-profile-box {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 18px; border-radius: 14px; margin: 20px auto; max-width: 520px; text-align: left;
        }
        
        #virtual-scroll-viewport { height: 460px; overflow-y: auto; position: relative; width: 100%; background: rgba(0, 0, 0, 0.15); border-radius: 8px; }
        #virtual-scroll-spacer { position: absolute; width: 100%; top: 0; left: 0; }
        #virtual-scroll-content { position: absolute; left: 0; top: 0; width: 100%; }
        
        .student-row { 
            height: 90px; display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.08); 
        }
        .student-info { 
            flex: 1; text-align: left; padding-right: 6px; display: flex; flex-direction: column; justify-content: center;
        }
        .student-info b {
            font-size: 14px; line-height: 1.2; word-break: break-word; overflow: visible; white-space: normal; display: block; margin-bottom: 2px;
        }
        .student-info small { font-size: 11px; opacity: 0.85; display: block; white-space: nowrap; line-height: 1.4; }
        .student-actions { display: flex; gap: 5px; flex-shrink: 0; align-items: center; }
        .student-actions button { padding: 10px 12px; margin: 0; font-size: 14px; }
        .streak-badge { background: #e74c3c; color: white; padding: 1px 4px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-left: 4px; display: inline-block; vertical-align: middle; }
        
        #rankingBox, .calendar-nested-box { margin-top: 20px; background: rgba(255, 255, 255, 0.12); padding: 16px; border-radius: 12px; text-align: left; }
        .rankItem { margin: 8px 0; font-size: 15px; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 5px; }
        #cloudStatus { position: fixed; bottom: 10px; right: 10px; font-size: 12px; background: rgba(0,0,0,0.85); padding: 6px 12px; border-radius: 6px; z-index: 1000; font-weight: bold; }
    </style>
</head>
<body>

    <button class="primary modeToggle" onclick="toggleMode()">🌙 / ☀ Mode</button>

    <div id="login" class="page active">
        <div class="login-bg-effects">
            <div class="circle-effect" style="width:140px; height:140px; top:15%; left:10%;"></div>
            <div class="circle-effect" style="width:200px; height:200px; bottom:15%; right:8%; background:linear-gradient(45deg, #00c6ff, #0072ff);"></div>
        </div>
        <div class="center" style="position:relative; z-index:10;">
            <h1 style="font-size:32px; letter-spacing:1px; margin-top:60px; text-shadow:0 4px 10px rgba(0,0,0,0.2);">📚 Student Record App</h1>
            <div class="auth-container">
                <h2 style="margin-top:0; font-size:20px;">🔐 Cloud Account Gateway</h2>
                <input type="text" id="teacherUsername" placeholder="Enter Unique User ID">
                <input type="password" id="teacherPassword" placeholder="Enter Account Password">
                <button class="success-btn" style="width: 100%; padding: 14px; margin-top: 15px; font-size:16px; border-radius:10px;" onclick="handleCloudAuth()">Login / Create Account ➔</button>
            </div>
        </div>
    </div>

    <div id="home" class="page">
        <div class="center">
            <h1 id="welcomeTitle">Welcome</h1>
            
            <div class="search-profile-box">
                <h3 style="margin-top:0; color:#1abc9c; display:flex; align-items:center; gap:6px;">🔍 Find Student Across Subjects</h3>
                <label style="font-size:12px; opacity:0.8;">1. Select Class Target:</label>
                <select id="searchClassDropdown" onchange="clearSearchOutputFields()"><option value="">-- Choose Target Class --</option></select>
                <label style="font-size:12px; opacity:0.8;">2. Enter Student Profile Name:</label>
                <input type="text" id="searchStudentName" placeholder="Type name completely...">
                <button class="primary" style="width:100%; margin:8px 0 0 0; background:#3498db;" onclick="executeGlobalStudentSearch()">Fetch Analytical Report</button>
                <div id="globalSearchResultDisplay" style="margin-top:14px; background:rgba(0,0,0,0.2); padding:10px; border-radius:8px; display:none; max-height:220px; overflow-y:auto;"></div>
            </div>

            <hr style="opacity:0.1; margin:20px 0;">

            <div style="padding: 0 10px;">
                <input type="text" id="newClass" placeholder="Add Class Name (e.g., Class 12-B)" style="max-width: 320px;"><br>
                <button class="primary" onclick="addClass()">Initialize Class Structure</button>
            </div>
            <div class="icon-grid" id="classList"></div>
            
            <div style="margin-top: 32px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
                <button class="deleteBtn" onclick="logoutTeacher()">Disconnect Node ⬅</button>
            </div>
        </div>
    </div>

    <div id="subjectPage" class="page">
        <button class="backBtn" onclick="goHome()">⬅ Return to Terminal</button>
        <h2 id="classTitle" style="margin-top: 15px; color:#1abc9c;"></h2>
        
        <div style="background: rgba(255, 255, 255, 0.1); padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: center; border: 1px dashed rgba(255,255,255,0.2);">
            <h4 style="margin: 0 0 8px 0; color:#f1c40f;">📊 Master Class Report Matrix Generation</h4>
            <button class="pdf-btn" style="background: #9b59b6; font-size: 15px; padding: 12px 24px;" onclick="generateCompleteClassMatrixPDF()">📄 Download Whole Class Master PDF</button>
        </div>

        <div class="center">
            <input type="text" id="newSubject" placeholder="Enter Subject Name (e.g., Physics)" style="max-width: 320px;"><br>
            <button class="primary" onclick="addSubject()">Add Subject Field</button>
        </div>
        <div class="icon-grid" id="subjectList"></div>
    </div>

    <div id="subSubjectPage" class="page">
        <button class="backBtn" onclick="backToSubjects()">⬅ Return to Subjects</button>
        <h2 id="subjectTitle" style="margin-top: 15px; color:#1abc9c;"></h2>
        <div class="center">
            <input type="text" id="newSubSubject" placeholder="Enter Chapter Designation" style="max-width: 320px;"><br>
            <button class="primary" onclick="addSubSubject()">Add Sub Subject</button>
        </div>
        <div class="icon-grid" id="subSubjectList"></div>
    </div>

    <div id="studentPage" class="page">
        <button class="backBtn" onclick="backToSubSubjects()">⬅ Return to Chapters</button>
        <h2 id="subSubjectTitle" style="margin-top: 15px; word-break: break-all;"></h2>
        
        <div class="stats-widget">📈 Verified Submissions: <span id="statsChecked">0</span> / <span id="statsTotal">0</span></div>

        <div style="background: rgba(255,255,255,0.08); padding: 14px; border-radius: 10px; margin-bottom: 16px;">
            <input type="text" id="studentNamesInput" placeholder="Enter Student Profiles (Separated with commas: Karan, Rahul, Rohan)"><br>
            <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-top: 5px;">
                <button class="primary" style="flex:1;" onclick="addStudentsText()">Bulk Register Profiles</button>
                <button class="excel-btn" style="flex:1;" onclick="triggerExcelFileSelector()">📁 Import List from Excel / CSV</button>
                <input type="file" id="excelHiddenFile" accept=".csv, .txt, .xlsx" style="display:none;" onchange="processExcelOrCsvUpload(this)">
            </div>
        </div>

        <div style="background: rgba(26, 188, 156, 0.12); padding: 14px; border-radius: 10px; margin-bottom: 16px; border-left: 4px solid #1abc9c;">
            <input type="text" id="localSearchInput" placeholder="🔍 Search indexed name..." oninput="refreshVirtualScroll()">
            <div style="margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap;">
                <button id="uncheckFilterBtn" class="toggleFilterBtn" onclick="toggleUncheckedFilter()">⚠️ Unchecked Copy List</button>
                <button id="voiceBtn" class="voice-btn" onclick="toggleVoiceRecognition()">🎙️ Voice Verification Matrix</button>
                <button class="pdf-btn" onclick="generatePremiumTabularPDF()">📄 Structural PDF Document</button>
                <button class="whatsapp-btn" onclick="shareReportViaWhatsAppMatrix()">💬 Share via WhatsApp</button>
                <button class="primary" style="background:#8e44ad;" onclick="toggleNestedCalendarWidget()">📅 Chapter Historic Logs</button>
                <button class="primary" style="background:#f1c40f; color:black;" onclick="toggleChapterRankingWidget()">🏆 Chapter Leaderboard</button>
            </div>
            <div id="voiceStatus" style="font-size:12px; margin-top:6px; color:#f39c12; display:none; font-weight:bold;">Biometric Voice Feed Active...</div>
            <div id="nestedCalendarBox" class="calendar-nested-box" style="display:none;"></div>
            <div id="rankingBox" style="display:none; margin: 20px auto 0 auto; max-width: 520px;"></div>
        </div>

        <div id="virtual-scroll-viewport">
            <div id="virtual-scroll-spacer"></div>
            <div id="virtual-scroll-content"></div>
        </div>
    </div>

    <div id="cloudStatus">☁️ Status Checker Ready</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAB77vRMD9FcIVsHXPU3c8lAsBR0HRLmcY",
            authDomain: "student-record-app-45ed3.firebaseapp.com",
            databaseURL: "https://student-record-app-45ed3-default-rtdb.firebaseio.com",
            projectId: "student-record-app-45ed3",
            storageBucket: "student-record-app-45ed3.appspot.com",
            messagingSenderId: "581800549444",
            appId: "1:581800549444:web:f86cec08754bbb1d58bec5",
            measurementId: "G-9QJPS5TDWF"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let data = {}; 
        let currentClass = ""; let currentSubject = ""; let currentSubSubject = "";
        let filterUncheckedOnly = false; let filteredStudentsList = [];
        let recognition = null; let isListening = false;
        let activeCloudUser = "";
        let audioCtx = null;
        let liveSubscriptionUnsubscribe = null; // Holds Firebase realtime subscription reference

        function getTodayString() {
            // Devices ka formatting alag hone ki dikkat hatane ke liye hamesha standard YYYY-MM-DD format banayein
            const d = new Date();
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${day}/${month}/${year}`;
        }

        function requestHardwareTerminalPermissions() {
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ audio: true }).catch(()=>{});
            }
        }

        function playSound(type) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                if (type === 'check') {
                    osc.frequency.setValueAtTime(580, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.08);
                } else {
                    osc.frequency.setValueAtTime(240, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.12);
                }
            } catch(e){}
        }

        // REAL-TIME LISTENER FOR MULTI-DEVICE SYNC
        function setupRealtimeListener(userDocId) {
            if (liveSubscriptionUnsubscribe) {
                liveSubscriptionUnsubscribe(); // Clean existing listeners first
            }
            
            document.getElementById("cloudStatus").innerText = "🔄 Establishing Live Sync...";
            
            liveSubscriptionUnsubscribe = db.collection("teachers_pwd").doc(userDocId)
                .onSnapshot((doc) => {
                    if (doc.exists) {
                        const incomingData = doc.data().schoolData || {};
                        // Safely replace local data with server-side live data to prevent collision
                        data = JSON.parse(JSON.stringify(incomingData));
                        document.getElementById("cloudStatus").innerText = "☁️ Realtime Sync: Active";
                        
                        // Live updates triggered instantly in the viewport based on active page
                        refreshActiveInterfaceViewports();
                    }
                }, (error) => {
                    document.getElementById("cloudStatus").innerText = "⚠️ Sync Error: Retry Log";
                });
        }

        function refreshActiveInterfaceViewports() {
            updateLiveVisualCounters();
            populateSearchDropdown();
            
            // Check dynamically which DOM page is active and re-render only the required component
            if (document.getElementById("home").classList.contains("active")) {
                renderClasses();
            } else if (document.getElementById("subjectPage").classList.contains("active")) {
                renderSubjects();
            } else if (document.getElementById("subSubjectPage").classList.contains("active")) {
                renderSubSubjects();
            } else if (document.getElementById("studentPage").classList.contains("active")) {
                refreshVirtualScroll();
                if(document.getElementById("rankingBox").style.display === "block") {
                    renderChapterLeaderboard();
                }
            }
        }

        async function saveData() { 
            updateLiveVisualCounters();
            if (activeCloudUser) {
                try {
                    // Overwrite instead of `{merge: true}` to enforce hard deletion across multiple device instances
                    await db.collection("teachers_pwd").doc(activeCloudUser).update({ schoolData: data });
                    document.getElementById("cloudStatus").innerText = "☁️ Data Node Locked: Synced";
                } catch (e) {
                    // Fallback for creating doc if write failed (failsafe)
                    await db.collection("teachers_pwd").doc(activeCloudUser).set({ schoolData: data }, { merge: false });
                    document.getElementById("cloudStatus").innerText = "☁️ Data Reset Synced";
                }
            }
        }
        
        function showPage(id) {
            document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
            document.getElementById(id).classList.add("active");
            window.scrollTo(0,0);
        }
        
        function goHome() { showPage("home"); renderClasses(); populateSearchDropdown(); }
        function toggleMode() { document.body.classList.toggle("light-mode"); }

        function handleCloudAuth() {
            let user = document.getElementById("teacherUsername").value.trim().toLowerCase();
            let pass = document.getElementById("teacherPassword").value.trim();
            if(!user || !pass) return;
            
            document.getElementById("cloudStatus").innerText = "🔄 Dynamic Authentication Pending...";
            
            db.collection("teachers_pwd").doc(user).get()
                .then((userDoc) => {
                    if (userDoc.exists) {
                        let docData = userDoc.data();
                        if (docData.accountPassword === pass) {
                            activeCloudUser = user;
                            localStorage.setItem("pwdCloudUser", activeCloudUser);
                            document.getElementById("welcomeTitle").innerText = `Welcome, ${activeCloudUser}`;
                            
                            // Initialize Real-time listener immediately
                            setupRealtimeListener(activeCloudUser);
                            goHome();
                        } else {
                            alert("❌ Credentials mismatch. Please try again.");
                            document.getElementById("cloudStatus").innerText = "⚠️ Access Denied";
                        }
                    } else {
                        if (confirm(`User node "${user}" does not exist. Initialize fresh storage matrix?`)) {
                            db.collection("teachers_pwd").doc(user).set({
                                accountPassword: pass,
                                schoolData: {}
                            }).then(() => {
                                activeCloudUser = user;
                                localStorage.setItem("pwdCloudUser", activeCloudUser);
                                document.getElementById("welcomeTitle").innerText = `Welcome, ${activeCloudUser}`;
                                setupRealtimeListener(activeCloudUser);
                                goHome();
                            });
                        }
                    }
                })
                .catch((e) => {
                    alert("Sync Timeout / Internal Error");
                });
        }

        function logoutTeacher() {
            if (liveSubscriptionUnsubscribe) {
                liveSubscriptionUnsubscribe(); // Stop receiving Firestore live feeds on logout
                liveSubscriptionUnsubscribe = null;
            }
            localStorage.removeItem("pwdCloudUser"); activeCloudUser = ""; data = {};
            showPage("login");
        }

        function populateSearchDropdown() {
            let select = document.getElementById("searchClassDropdown");
            if(!select) return;
            let currentSelection = select.value;
            select.innerHTML = '<option value="">-- Choose Target Class --</option>';
            for (let cls in data) {
                let opt = document.createElement("option"); opt.value = cls; opt.innerText = cls;
                if(cls === currentSelection) opt.selected = true;
                select.appendChild(opt);
            }
        }
        
        function clearSearchOutputFields() {
            document.getElementById("globalSearchResultDisplay").style.display = "none";
            document.getElementById("searchStudentName").value = "";
        }

        function executeGlobalStudentSearch() {
            let targetCls = document.getElementById("searchClassDropdown").value;
            let targetName = document.getElementById("searchStudentName").value.trim().toLowerCase();
            let container = document.getElementById("globalSearchResultDisplay");

            if(!targetCls) { alert("Please pick a saved class channel structure."); return; }
            if(!targetName) { alert("Please specify the student profile name."); return; }

            container.innerHTML = "";
            let matchFound = false;
            let reportHtml = `<h4 style='margin:0 0 8px 0; color:#38ef7d;'>Profile Log Analysis for: "${targetName}"</h4>`;

            if(data[targetCls]) {
                for(let subject in data[targetCls]) {
                    let subjectHeaderAdded = false;
                    for(let subsub in data[targetCls][subject]) {
                        let chapterObj = data[targetCls][subject][subsub];
                        if(chapterObj && chapterObj.students) {
                            let match = chapterObj.students.find(s => s.name.toLowerCase() === targetName);
                            if(match) {
                                matchFound = true;
                                if(!subjectHeaderAdded) {
                                    reportHtml += `<p style='margin:6px 0 2px 0; font-weight:bold; color:#f1c40f;'>📘 Subject: ${subject}</p>`;
                                    subjectHeaderAdded = true;
                                }
                                let today = getTodayString();
                                let status = match.dates.includes(today) ? "<span style='color:#2ecc71;'>[VERIFIED TODAY]</span>" : "<span style='color:#e74c3c;'>[PENDING TODAY]</span>";
                                reportHtml += `<p style='margin:2px 0 2px 12px; font-size:13px;'>📖 Chapter: ${subsub} ➔ Total Clearances: <b>${match.dates.length}</b> ${status}</p>`;
                            }
                        }
                    }
                }
            }

            if(!matchFound) {
                container.innerHTML = `<p style='color:#e74c3c; margin:0;'>❌ No profiles matched target identifier within "${targetCls}".</p>`;
            } else {
                container.innerHTML = reportHtml;
            }
            container.style.display = "block";
        }

        function addClass() {
            let name = document.getElementById("newClass").value.trim(); if (!name) return;
            if (!data[name]) data[name] = {};
            saveData(); document.getElementById("newClass").value = ""; renderClasses(); populateSearchDropdown();
        }
        
        function renderClasses() {
            let list = document.getElementById("classList"); list.innerHTML = "";
            for (let cls in data) {
                let div = document.createElement("div"); div.className = "icon-box";
                div.innerHTML = `<span>🏫 <b>${cls}</b></span>`;
                let del = document.createElement("button"); del.innerText = "🗑 Drop"; del.className = "deleteBtn";
                del.onclick = (e) => { e.stopPropagation(); if(confirm(`Erase structural node ${cls}?`)) { delete data[cls]; saveData(); renderClasses(); populateSearchDropdown(); } };
                div.appendChild(del);
                div.onclick = () => {
                    currentClass = cls; showPage("subjectPage");
                    document.getElementById("classTitle").innerText = `Index: ${cls} ➔ Subjects`;
                    renderSubjects();
                };
                list.appendChild(div);
            }
        }

        function addSubject() {
            let name = document.getElementById("newSubject").value.trim(); if (!name) return;
            if (!data[currentClass][name]) data[currentClass][name] = {};
            saveData(); document.getElementById("newSubject").value = ""; renderSubjects();
        }
        
        function renderSubjects() {
            let list = document.getElementById("subjectList"); list.innerHTML = "";
            for (let sub in data[currentClass]) {
                let div = document.createElement("div"); div.className = "icon-box";
                div.innerHTML = `<span>📘 ${sub}</span>`;
                let del = document.createElement("button"); del.innerText = "🗑"; del.className = "deleteBtn";
                del.onclick = (e) => { e.stopPropagation(); if(confirm(`Drop field ${sub}?`)) { delete data[currentClass][sub]; saveData(); renderSubjects(); } };
                div.appendChild(del);
                div.onclick = () => {
                    currentSubject = sub; showPage("subSubjectPage");
                    document.getElementById("subjectTitle").innerText = `${currentClass} ➔ ${sub}`;
                    renderSubSubjects();
                };
                list.appendChild(div);
            }
        }
        function backToSubjects() { showPage("subjectPage"); }

        function addSubSubject() {
            let name = document.getElementById("newSubSubject").value.trim(); if (!name) return;
            if (!data[currentClass][currentSubject][name]) data[currentClass][currentSubject][name] = { students: [] };
            saveData(); document.getElementById("newSubSubject").value = ""; renderSubSubjects();
        }
        
        function renderSubSubjects() {
            let list = document.getElementById("subSubjectList"); list.innerHTML = "";
            for (let subsub in data[currentClass][currentSubject]) {
                let div = document.createElement("div"); div.className = "icon-box";
                div.innerHTML = `<span>📖 ${subsub}</span>`;
                let del = document.createElement("button"); del.innerText = "🗑"; del.className = "deleteBtn";
                del.onclick = (e) => { e.stopPropagation(); if(confirm(`Drop sub subject segment ${subsub}?`)) { delete data[currentClass][currentSubject][subsub]; saveData(); renderSubSubjects(); } };
                div.appendChild(del);
                div.onclick = () => {
                    currentSubSubject = subsub;
                    document.getElementById("localSearchInput").value = ""; filterUncheckedOnly = false;
                    document.getElementById("nestedCalendarBox").style.display = "none";
                    document.getElementById("rankingBox").style.display = "none";
                    showPage("studentPage");
                    document.getElementById("subSubjectTitle").innerText = `${currentClass} ➔ ${currentSubject} ➔ ${currentSubSubject}`;
                    refreshVirtualScroll();
                };
                list.appendChild(div);
            }
        }
        function backToSubSubjects() { showPage("subSubjectPage"); }

        function addStudentsText() {
            let names = document.getElementById("studentNamesInput").value.split(",");
            names.forEach(n => {
                let name = n.trim();
                if (name) {
                    let exists = data[currentClass][currentSubject][currentSubSubject].students.some(s => s.name.toLowerCase() === name.toLowerCase());
                    if(!exists) data[currentClass][currentSubject][currentSubSubject].students.push({ name: name, dates: [] });
                }
            });
            document.getElementById("studentNamesInput").value = ""; saveData(); refreshVirtualScroll();
        }

        function triggerExcelFileSelector() { document.getElementById("excelHiddenFile").click(); }
        function processExcelOrCsvUpload(input) {
            if (input.files && input.files[0]) {
                let file = input.files[0];
                let reader = new FileReader();
                reader.onload = function(e) {
                    let text = e.target.result;
                    let lines = text.split(/\r?\n/);
                    let extractedNames = [];
                    lines.forEach(line => {
                        let cleaned = line.replace(/["']/g, "").trim();
                        let columns = cleaned.split(/,|\t/); 
                        let studentName = columns[0] ? columns[0].trim() : "";
                        if (studentName && studentName.toLowerCase() !== "name" && studentName.toLowerCase() !== "student name") {
                            extractedNames.push(studentName);
                        }
                    });
                    if(extractedNames.length === 0) { alert("Could not extract any valid names."); return; }
                    if(confirm(`Extracted ${extractedNames.length} student names. Add them now?`)) {
                        extractedNames.forEach(name => {
                            let exists = data[currentClass][currentSubject][currentSubSubject].students.some(s => s.name.toLowerCase() === name.toLowerCase());
                            if(!exists) data[currentClass][currentSubject][currentSubSubject].students.push({ name: name, dates: [] });
                        });
                        saveData(); refreshVirtualScroll();
                    }
                };
                reader.readAsText(file);
                input.value = ""; 
            }
        }

        function shareReportViaWhatsAppMatrix() {
            let today = getTodayString();
            let students = data[currentClass][currentSubject][currentSubSubject].students || [];
            if(students.length === 0) { alert("No student records exist."); return; }
            let textBlock = `*📊 Attendance Tracking Log Update*\n\n*Class:* ${currentClass}\n*Subject:* ${currentSubject}\n*Chapter:* ${currentSubSubject}\n*Date:* ${today}\n\n======================\n`;
            students.forEach((s, idx) => {
                let verified = s.dates.includes(today) ? "✔️ CHECKED" : "❌ UNCHECKED";
                textBlock += `${idx + 1}. ${s.name} ➔ ${verified}\n`;
            });
            window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(textBlock), '_blank');
        }

        function calculateStreak(studentName) {
            let total = 0; let chapters = data[currentClass][currentSubject];
            for (let ch in chapters) {
                if (chapters[ch].students) {
                    let match = chapters[ch].students.find(s => s.name.toLowerCase() === studentName.toLowerCase());
                    if (match && match.dates && match.dates.length > 0) total++;
                }
            }
            return total;
        }

        // Real-Time System Updates
        function updateLiveVisualCounters() {
            if(!currentClass || !data[currentClass] || !data[currentClass][currentSubject] || !data[currentClass][currentSubject][currentSubSubject]) return;
            let students = data[currentClass][currentSubject][currentSubSubject].students || [];
            let today = getTodayString();
            let checkedCount = students.filter(s => s.dates.includes(today)).length;
            document.getElementById("statsChecked").innerText = checkedCount;
            document.getElementById("statsTotal").innerText = students.length;
        }

        function savePdfUniversally(doc, filename) {
            try {
                let pdfOutput = doc.output('blob');
                let blobUrl = URL.createObjectURL(pdfOutput);

                let rawBase64 = doc.output('datauristring');
                
                let downloadLink = document.createElement('a');
                downloadLink.href = rawBase64;
                downloadLink.download = filename;
                downloadLink.style.display = 'none';
                document.body.appendChild(downloadLink);
                downloadLink.click();
                
                setTimeout(() => {
                    document.body.removeChild(downloadLink);
                    URL.revokeObjectURL(blobUrl);
                }, 400);
            } catch (err) {
                try {
                    doc.save(filename);
                } catch(e) {
                    alert("Click detected! If download is still stuck, please ensure Storage/Download permission is granted to this app in system settings.");
                }
            }
        }

        function generatePremiumTabularPDF() {
            const { jsPDF } = window.jspdf;
            let doc = new jsPDF();
            let today = getTodayString();
            
            doc.setFont("Helvetica", "bold");
            doc.setFontSize(18);
            doc.text(`Attendance Log: ${currentClass}`, 14, 20);
            doc.setFontSize(12);
            doc.setFont("Helvetica", "normal");
            doc.text(`Subject: ${currentSubject} | Chapter: ${currentSubSubject}`, 14, 28);
            doc.text(`Generation Date: ${today}`, 14, 34);
            
            let students = data[currentClass][currentSubject][currentSubSubject].students || [];
            let tableRows = [];
            students.forEach((s, idx) => {
                let status = s.dates.includes(today) ? "CHECKED" : "UNCHECKED";
                tableRows.push([idx + 1, s.name, status, s.dates.length]);
            });
            
            doc.autoTable({
                startY: 40,
                head: [['S.No', 'Student Name', 'Status (Today)', 'Total Attendance Entries']],
                body: tableRows,
                theme: 'striped',
                headStyles: { fillColor: [26, 188, 156] },
                didParseCell: function (tableData) {
                    if (tableData.section === 'body' && tableData.column.index === 2) {
                        if (tableData.cell.raw === 'CHECKED') {
                            tableData.cell.styles.textColor = [39, 174, 96];
                            tableData.cell.styles.fontStyle = 'bold';
                        } else {
                            tableData.cell.styles.textColor = [192, 57, 43];
                            tableData.cell.styles.fontStyle = 'bold';
                        }
                    }
                }
            });
            
            savePdfUniversally(doc, `${currentClass}_${currentSubject}_${currentSubSubject}_Report.pdf`.replace(/\s+/g, '_'));
        }

        function generateCompleteClassMatrixPDF() {
            const { jsPDF } = window.jspdf;
            let doc = new jsPDF('l', 'mm', 'a4'); 
            let today = getTodayString();
            
            doc.setFont("Helvetica", "bold");
            doc.setFontSize(20);
            doc.text(`🏫 Master Class Performance Matrix: ${currentClass}`, 14, 18);
            doc.setFontSize(11);
            doc.setFont("Helvetica", "normal");
            doc.text(`Generated Date: ${today}`, 14, 25);
            
            let allStudentNamesSet = new Set();
            let allSubjectsMap = data[currentClass] || {};
            
            for (let sub in allSubjectsMap) {
                for (let ch in allSubjectsMap[sub]) {
                    let chObj = allSubjectsMap[sub][ch];
                    if(chObj && chObj.students) {
                        chObj.students.forEach(s => allStudentNamesSet.add(s.name));
                    }
                }
            }
            
            let uniqueStudentsList = Array.from(allStudentNamesSet).sort();
            if(uniqueStudentsList.length === 0) { alert("❌ No student records profiles found in this class."); return; }
            
            let headers = ['Student Name'];
            let trackColumnsKeys = []; 
            
            for (let sub in allSubjectsMap) {
                for (let ch in allSubjectsMap[sub]) {
                    headers.push(`${sub}\n(${ch})`);
                    trackColumnsKeys.push({ subject: sub, chapter: ch });
                }
            }
            if(trackColumnsKeys.length === 0) { headers.push('No Active Modules'); }
            
            let tableRows = [];
            uniqueStudentsList.forEach(studentName => {
                let rowData = [studentName];
                trackColumnsKeys.forEach(key => {
                    let chObj = allSubjectsMap[key.subject][key.chapter];
                    let match = chObj.students.find(s => s.name.toLowerCase() === studentName.toLowerCase());
                    if(match) {
                        rowData.push(match.dates.includes(today) ? "CHECKED" : "UNCHECKED");
                    } else {
                        rowData.push("-");
                    }
                });
                if(trackColumnsKeys.length === 0) { rowData.push("Create subjects/chapters first"); }
                tableRows.push(rowData);
            });
            
            doc.autoTable({
                startY: 32,
                head: [headers],
                body: tableRows,
                theme: 'grid',
                styles: { fontSize: 8, cellPadding: 2, halign: 'center', valign: 'middle' },
                columnStyles: { 0: { fontStyle: 'bold', halign: 'left', fontSize: 9 } },
                headStyles: { fillColor: [52, 152, 219], textColor: [255, 255, 255] },
                didParseCell: function (tableData) {
                    if (tableData.section === 'body' && tableData.column.index > 0) {
                        if (tableData.cell.raw === 'CHECKED') {
                            tableData.cell.styles.textColor = [39, 174, 96];
                            tableData.cell.styles.fontStyle = 'bold';
                        } else if (tableData.cell.raw === 'UNCHECKED') {
                            tableData.cell.styles.textColor = [192, 57, 43];
                            tableData.cell.styles.fontStyle = 'bold';
                        }
                    }
                }
            });
            
            savePdfUniversally(doc, `Master_Matrix_${currentClass}_Report.pdf`.replace(/\s+/g, '_'));
        }

        const ROW_HEIGHT = 90; const VIEWPORT_HEIGHT = 460;
        function refreshVirtualScroll() {
            let container = document.getElementById("virtual-scroll-viewport");
            if(!container || !currentClass || !data[currentClass] || !data[currentClass][currentSubject] || !data[currentClass][currentSubject][currentSubSubject]) return;
            
            let students = data[currentClass][currentSubject][currentSubSubject].students || [];
            let searchQuery = document.getElementById("localSearchInput").value.trim().toLowerCase();
            let today = getTodayString();
            
            filteredStudentsList = students.filter(s => {
                let matchSearch = s.name.toLowerCase().includes(searchQuery);
                if(filterUncheckedOnly) return matchSearch && !s.dates.includes(today);
                return matchSearch;
            });
            
            document.getElementById("virtual-scroll-spacer").style.height = (filteredStudentsList.length * ROW_HEIGHT) + "px";
            updateVirtualScrollDomNodes();
        }

        function getLatestCheckedDate(datesArray) {
            if (!datesArray || datesArray.length === 0) return "N/A";
            let sorted = [...datesArray].sort((a, b) => new Date(b.split('/').reverse().join('-')) - new Date(a.split('/').reverse().join('-')));
            return sorted[0];
        }

        function updateVirtualScrollDomNodes() {
            let viewport = document.getElementById("virtual-scroll-viewport");
            let contentBox = document.getElementById("virtual-scroll-content");
            if(!viewport) return;
            
            let scrollTop = viewport.scrollTop;
            let startIndex = Math.floor(scrollTop / ROW_HEIGHT);
            let endIndex = Math.min(filteredStudentsList.length - 1, Math.floor((scrollTop + VIEWPORT_HEIGHT) / ROW_HEIGHT));
            
            contentBox.style.transform = `translateY(${startIndex * ROW_HEIGHT}px)`;
            contentBox.innerHTML = "";
            let today = getTodayString();
            
            for(let i = startIndex; i <= endIndex; i++) {
                let student = filteredStudentsList[i];
                let isChecked = student.dates.includes(today);
                let currentStreak = calculateStreak(student.name);
                let latestDate = getLatestCheckedDate(student.dates);
                
                let row = document.createElement("div");
                row.className = "student-row";
                row.style.height = ROW_HEIGHT + "px";
                row.innerHTML = `
                    <div class="student-info">
                        <b>${student.name} <span class="streak-badge">⚡ ${currentStreak}</span></b>
                        <small>Logs: ${student.dates.length} entries</small>
                        <small style="color: #f1c40f;">Latest Check: ${latestDate}</small>
                    </div>
                    <div class="student-actions">
                        <button class="${isChecked ? 'checkedBtn' : 'primary'}" onclick="markStudentStatusInline('${student.name}', true)">✔</button>
                        <button class="${!isChecked ? 'uncheckBtn' : 'primary'}" style="background:${!isChecked ? '#e74c3c':''};" onclick="markStudentStatusInline('${student.name}', false)">✖</button>
                        <button class="deleteBtn" style="padding:10px;" onclick="deleteStudentProfileInline('${student.name}')">🗑</button>
                    </div>
                `;
                contentBox.appendChild(row);
            }
        }
        document.getElementById("virtual-scroll-viewport").addEventListener("scroll", updateVirtualScrollDomNodes);

        function markStudentStatusInline(name, status) {
            let today = getTodayString();
            let students = data[currentClass][currentSubject][currentSubSubject].students || [];
            let student = students.find(s => s.name.toLowerCase() === name.toLowerCase());
            if(student) {
                let idx = student.dates.indexOf(today);
                if(status) {
                    if(idx === -1) { student.dates.push(today); playSound('check'); }
                } else {
                    if(idx !== -1) { student.dates.splice(idx, 1); playSound('uncheck'); }
                }
                saveData(); refreshVirtualScroll();
                if(document.getElementById("rankingBox").style.display === "block") {
                    renderChapterLeaderboard();
                }
            }
        }

        function deleteStudentProfileInline(name) {
            if(confirm(`Erase profile logs for ${name}?`)) {
                let students = data[currentClass][currentSubject][currentSubSubject].students || [];
                data[currentClass][currentSubject][currentSubSubject].students = students.filter(s => s.name.toLowerCase() !== name.toLowerCase());
                saveData(); refreshVirtualScroll();
                if(document.getElementById("rankingBox").style.display === "block") {
                    renderChapterLeaderboard();
                }
            }
        }

        function toggleUncheckedFilter() {
            filterUncheckedOnly = !filterUncheckedOnly;
            let btn = document.getElementById("uncheckFilterBtn");
            if(filterUncheckedOnly) {
                btn.innerText = "📋 View Full Roster List";
                btn.style.background = "#e74c3c"; btn.style.color = "white";
            } else {
                btn.innerText = "⚠️ Unchecked Copy List";
                btn.style.background = "#f1c40f"; btn.style.color = "black";
            }
            refreshVirtualScroll();
        }

        function toggleVoiceRecognition() {
            if(isListening) { stopVoiceEngine(); return; }
            window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!window.SpeechRecognition) { alert("Speech recognition not supported inside this browser."); return; }
            
            requestHardwareTerminalPermissions();
            recognition = new window.SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'en-US';
            
            let statusWidget = document.getElementById("voiceStatus");
            let voiceBtn = document.getElementById("voiceBtn");
            
            recognition.onstart = () => {
                isListening = true;
                voiceBtn.innerText = "🛑 Stop Listening Matrix";
                voiceBtn.className = "voice-btn voice-active";
                statusWidget.innerText = "🎙️ Listening for student names dynamically...";
                statusWidget.style.display = "block";
            };
            recognition.onresult = (event) => {
                let lastResultIdx = event.results.length - 1;
                let textSpoken = event.results[lastResultIdx][0].transcript.trim().toLowerCase();
                statusWidget.innerText = `Matched Token stream: "${textSpoken}"`;
                
                let students = data[currentClass][currentSubject][currentSubSubject].students || [];
                let today = getTodayString();
                let matchFound = false;
                
                students.forEach(s => {
                    if(textSpoken.includes(s.name.toLowerCase()) || s.name.toLowerCase().includes(textSpoken)) {
                        if(!s.dates.includes(today)) { s.dates.push(today); matchFound = true; }
                    }
                });
                if(matchFound) { 
                    playSound('check'); saveData(); refreshVirtualScroll(); 
                    if(document.getElementById("rankingBox").style.display === "block") {
                        renderChapterLeaderboard();
                    }
                }
            };
            recognition.onerror = () => { stopVoiceEngine(); };
            recognition.onend = () => { stopVoiceEngine(); };
            recognition.start();
        }

        function stopVoiceEngine() {
            isListening = false;
            let voiceBtn = document.getElementById("voiceBtn");
            if(voiceBtn) { voiceBtn.innerText = "🎙️ Voice Verification Matrix"; voiceBtn.className = "voice-btn"; }
            let statusWidget = document.getElementById("voiceStatus");
            if(statusWidget) statusWidget.style.display = "none";
            if(recognition) { recognition.abort(); recognition = null; }
        }

        function toggleNestedCalendarWidget() {
            let box = document.getElementById("nestedCalendarBox");
            if(box.style.display === "block") { box.style.display = "none"; return; }
            let students = data[currentClass][currentSubject][currentSubSubject].students || [];
            let allDatesSet = new Set();
            students.forEach(s => s.dates.forEach(d => allDatesSet.add(d)));
            let sortedDates = Array.from(allDatesSet).sort((a,b) => new Date(b) - new Date(a));
            
            box.innerHTML = "<h4 style='margin:0 0 10px 0; color:#f1c40f;'>Select Target Log Date Context:</h4>";
            if(sortedDates.length === 0) {
                box.innerHTML += "<p style='font-size:13px; opacity:0.7;'>No archived logs discovered.</p>";
            } else {
                let select = document.createElement("select");
                select.innerHTML = "<option value=''>-- Pick Target History Date --</option>";
                sortedDates.forEach(d => {
                    let opt = document.createElement("option"); opt.value = d; opt.innerText = d;
                    select.appendChild(opt);
                });
                let outputDiv = document.createElement("div");
                outputDiv.style.marginTop = "10px"; outputDiv.style.maxHeight = "180px"; outputDiv.style.overflowY = "auto";
                outputDiv.style.background = "rgba(0,0,0,0.2)"; outputDiv.style.borderRadius = "6px"; outputDiv.style.padding = "8px";
                
                select.onchange = () => {
                    let picked = select.value; if(!picked) { outputDiv.innerHTML = ""; return; }
                    let checkedNames = []; let uncheckedNames = [];
                    students.forEach(s => {
                        if(s.dates.includes(picked)) checkedNames.push(s.name);
                        else uncheckedNames.push(s.name);
                    });
                    outputDiv.innerHTML = `
                        <p style='margin:2px 0; color:#2ecc71;'><b>✔️ Verified (${checkedNames.length}):</b> ${checkedNames.join(", ") || 'None'}</p>
                        <p style='margin:8px 0 2px 0; color:#e74c3c;'><b>❌ Pending (${uncheckedNames.length}):</b> ${uncheckedNames.join(", ") || 'None'}</p>
                    `;
                };
                box.appendChild(select); box.appendChild(outputDiv);
            }
            box.style.display = "block";
        }

        function toggleChapterRankingWidget() {
            let box = document.getElementById("rankingBox");
            if(box.style.display === "block") { box.style.display = "none"; return; }
            renderChapterLeaderboard();
            box.style.display = "block";
        }

        function renderChapterLeaderboard() {
            let box = document.getElementById("rankingBox");
            if(!box) return;
            let students = data[currentClass][currentSubject][currentSubSubject].students || [];
            
            let sortedRanks = students.map(s => {
                return { name: s.name, points: s.dates.length };
            }).sort((a,b) => b.points - a.points);
            
            box.innerHTML = `<h3 style='margin:0 0 12px 0; color:#f1c40f;'>🏆 Chapter Performance Ranks: ${currentSubSubject}</h3>`;
            if(sortedRanks.length === 0) {
                box.innerHTML += "<p style='font-size:13px; opacity:0.8;'>No student records found in this chapter.</p>";
            } else {
                sortedRanks.slice(0, 5).forEach((item, idx) => {
                    let medals = ['🥇', '🥈', '🥉', '✨', '✨'];
                    box.innerHTML += `<div class='rankItem'>${medals[idx] || '✨'} <b>Rank ${idx+1}: ${item.name}</b> ➔ Copies Checked: <b>${item.points} times</b></div>`;
                });
            }
        }

        window.onload = function() {
            let savedUser = localStorage.getItem("pwdCloudUser");
            if (savedUser) {
                activeCloudUser = savedUser;
                document.getElementById("welcomeTitle").innerText = `Welcome, ${activeCloudUser}`;
                setupRealtimeListener(activeCloudUser);
                goHome();
            }
        };
    </script>
