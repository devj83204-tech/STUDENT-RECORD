<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STUDENT RECORD APP</title>
    
    <!-- Firebase Legacy Architecture Frameworks -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <!-- Client PDF Component -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-variant-numeric: tabular-nums; }
        body {
            margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b); color: #f8fafc;
            overflow-x: hidden; width: 100vw; min-height: 100vh;
        }
        .light-mode { background: linear-gradient(135deg, #f8fafc, #e2e8f0) !important; color: #0f172a !important; }
        .light-mode .page { color: #0f172a !important; }
        .light-mode .icon-box, .light-mode .student-row, .light-mode #rankingBox, .light-mode .calendar-nested-box, .light-mode .stats-widget, .light-mode .search-profile-box {
            background: rgba(255, 255, 255, 0.8) !important; color: #0f172a !important; border: 1px solid #cbd5e1 !important; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .light-mode input, .light-mode select { background: #ffffff !important; color: #0f172a !important; border: 1px solid #cbd5e1 !important; }
        
        .page { display: none; padding: 20px; width: 100%; min-height: 100vh; position: relative; z-index: 10; max-width: 800px; margin: 0 auto; }
        .active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        .center { text-align: center; }
        
        .auth-container {
            max-width: 400px; margin: 40px auto; padding: 35px 25px;
            background: rgba(30, 41, 59, 0.7); border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3), 0 10px 10px -5px rgba(0,0,0,0.3);
            backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.1);
        }
        
        button {
            padding: 12px 20px; margin: 6px; border: none; border-radius: 12px;
            cursor: pointer; font-weight: 600; font-size: 14px;
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        button:active { transform: scale(0.97); }
        .primary { background: #3b82f6; color: white; }
        .primary:hover { background: #2563eb; }
        .success-btn { background: #10b981; color: white; }
        .success-btn:hover { background: #059669; }
        .pdf-btn { background: #8b5cf6; color: white; }
        .voice-btn { background: #f59e0b; color: white; }
        .voice-active { background: #ef4444 !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        .excel-btn { background: #0ea5e9; color: white; }
        .whatsapp-btn { background: #22c55e; color: white; }
        .deleteBtn { background: #ef4444; color: white; }
        .deleteBtn:hover { background: #dc2626; }
        .checkedBtn { background: #10b981; color: white; }
        .uncheckBtn { background: #f97316; color: white; }
        .backBtn { background: #475569; color: white; }
        .toggleFilterBtn { background: #eab308; color: #0f172a; }
        .modeToggle { position: fixed; top: 15px; right: 15px; z-index: 999; padding: 10px 14px; font-size: 13px; border-radius: 20px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); color: inherit; }
        
        .icon-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-top: 24px; width: 100%; }
        .icon-box {
            background: rgba(30, 41, 59, 0.45); padding: 20px; border-radius: 16px;
            text-align: center; cursor: pointer; display: flex; flex-direction: column;
            justify-content: space-between; align-items: center; gap: 14px; min-height: 140px;
            border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(12px);
            transition: all 0.2s ease;
        }
        .icon-box:hover { transform: translateY(-4px); border-color: #3b82f6; box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.2); }
        
        input, select { padding: 12px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); margin: 6px 0; color: #f8fafc; font-size: 15px; width: 100%; background: #1e293b; transition: all 0.2s; }
        input:focus, select:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3); }
        
        .stats-widget {
            background: rgba(16, 185, 129, 0.1); padding: 16px; border-radius: 14px;
            font-size: 16px; font-weight: 600; margin: 16px auto; border-left: 5px solid #10b981; text-align: center;
        }
        .search-profile-box {
            background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 20px; border-radius: 18px; margin: 24px auto; text-align: left;
        }
        
        .ptr-element { transform: translateY(-50px); height: 50px; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; color: #3b82f6; transition: transform 0.2s ease; }
        .ptr-loading { transform: translateY(0px) !important; }
        
        .skeleton-wrapper { display: none; width: 100%; margin-top: 20px; }
        .skeleton-box { height: 90px; background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%); background-size: 200% 100%; animation: loading-shimmer 1.5s infinite; border-radius: 16px; margin-bottom: 12px; }
        @keyframes loading-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        #virtual-scroll-viewport { height: 460px; overflow-y: auto; position: relative; width: 100%; background: rgba(0, 0, 0, 0.2); border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        #virtual-scroll-spacer { position: absolute; width: 100%; top: 0; left: 0; }
        #virtual-scroll-content { position: absolute; left: 0; top: 0; width: 100%; }
        
        .student-row { 
            height: 90px; display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); 
        }
        .student-info { flex: 1; text-align: left; padding-right: 8px; display: flex; flex-direction: column; justify-content: center; }
        .student-info b { font-size: 15px; color: inherit; line-height: 1.3; margin-bottom: 3px; }
        .student-info small { font-size: 12px; opacity: 0.7; line-height: 1.4; }
        .student-actions { display: flex; gap: 8px; flex-shrink: 0; align-items: center; }
        .student-actions button { padding: 10px 14px; margin: 0; font-size: 15px; border-radius: 10px; }
        .streak-badge { background: #ef4444; color: white; padding: 2px 6px; border-radius: 6px; font-size: 11px; font-weight: bold; margin-left: 6px; }
        
        #rankingBox, .calendar-nested-box { margin-top: 24px; background: rgba(30, 41, 59, 0.5); padding: 20px; border-radius: 16px; text-align: left; border: 1px solid rgba(255,255,255,0.05); }
        .rankItem { margin: 10px 0; font-size: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; }
        #cloudStatus { position: fixed; bottom: 15px; right: 15px; font-size: 12px; background: rgba(15, 23, 42, 0.9); padding: 8px 16px; border-radius: 20px; z-index: 1000; font-weight: 600; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); }
        
        .progress-tag { background: rgba(59, 130, 246, 0.2); color: #60a5fa; font-size: 11px; padding: 2px 6px; border-radius: 6px; font-weight: bold; margin-top: 4px; display: inline-block; }
    </style>
</head>
<body>

    <button class="modeToggle" onclick="toggleMode()">🌓 Toggle Theme</button>

    <!-- 🌐 SECTION 1: LOGIN TERMINAL -->
    <div id="login" class="page active">
        <div class="center" style="margin-top: 80px;">
            <h1 style="font-size:36px; font-weight: 800; letter-spacing:-0.5px; margin-bottom: 30px; background: linear-gradient(to right, #3b82f6, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">STUDENT RECORD APP</h1>
            <div class="auth-container">
                <h2 style="margin-top:0; font-size:22px; font-weight:700; margin-bottom:20px;">🔐 Login / Sign Up Page</h2>
                <input type="text" id="teacherUsername" placeholder="Enter Unique User ID">
                <input type="password" id="teacherPassword" placeholder="Enter Secure Password">
                <button class="success-btn" style="width: 100%; padding: 14px; margin-top: 15px; font-size:16px; border-radius:12px;" onclick="handleCloudAuth()">Create or Login Account ➔</button>
            </div>
        </div>
    </div>

    <!-- 🏫 SECTION 2: HOMEPAGE DASHBOARD -->
    <div id="home" class="page">
        <div>
            <h1 id="welcomeTitle" style="font-size:28px; font-weight:800;">Welcome Dashboard</h1>
            
            <div class="search-profile-box">
                <h3 style="margin-top:0; color:#3b82f6; display:flex; align-items:center; gap:8px;">🔍 Analytics Profile Tracker</h3>
                <select id="searchClassDropdown" onchange="clearSearchOutputFields()"><option value="">-- Select Class Channel --</option></select>
                <input type="text" id="searchStudentName" placeholder="Type target student name completely...">
                <button class="primary" style="width:100%; margin-top:10px;" onclick="executeGlobalStudentSearch()">Fetch Analytical Logs</button>
                <div id="globalSearchResultDisplay" style="margin-top:14px; background:rgba(0,0,0,0.2); padding:12px; border-radius:10px; display:none; max-height:220px; overflow-y:auto;"></div>
            </div>

            <div style="margin-top:24px;">
                <input type="text" id="newClass" placeholder="Create Class Node (e.g., Class 12-B)">
                <button class="primary" style="width:100%; margin-top:6px;" onclick="addClass()">Add Class</button>
            </div>
            
            <div class="skeleton-wrapper" id="homeSkeleton"><div class="skeleton-box"></div><div class="skeleton-box"></div></div>
            <div class="icon-grid" id="classList"></div>
            
            <div style="margin-top: 40px; text-align: center;">
                <button class="deleteBtn" onclick="logoutTeacher()">Secure Disconnect Node ⬅</button>
            </div>
        </div>
    </div>

    <!-- 📘 SECTION 3: SUBJECTS TERMINAL -->
    <div id="subjectPage" class="page">
        <button class="backBtn" onclick="goHome()">⬅ Back to Dashboard</button>
        <h2 id="classTitle" style="margin-top: 20px; font-weight:800;"></h2>
        
        <div style="background: rgba(59, 130, 246, 0.1); padding: 18px; border-radius: 16px; margin-bottom: 24px; text-align: center; border: 1px dashed rgba(59,130,246,0.3);">
            <h4 style="margin: 0 0 10px 0; color:#eab308; font-size:15px;">📊 Matrix Data Compilation Engine</h4>
            <button class="pdf-btn" style="font-size: 14px; padding: 12px 24px; border-radius:10px;" onclick="generateCompleteClassMatrixPDF_Option2()">📄 Download Full Class Matrix PDF</button>
        </div>

        <div>
            <input type="text" id="newSubject" placeholder="Enter New Subject Field">
            <button class="primary" style="width:100%; margin-top:6px;" onclick="addSubject()">Add Subject</button>
        </div>
        <div class="skeleton-wrapper" id="subjectSkeleton"><div class="skeleton-box"></div></div>
        <div class="icon-grid" id="subjectList"></div>
    </div>

    <!-- 📖 SECTION 4: CHAPTERS TERMINAL -->
    <div id="subSubjectPage" class="page">
        <button class="backBtn" onclick="backToSubjects()">⬅ Back to Subjects</button>
        <h2 id="subjectTitle" style="margin-top: 20px; font-weight:800;"></h2>
        <div>
            <input type="text" id="newSubSubject" placeholder="Enter Chapter / Sub-Subject Designation">
            <button class="primary" style="width:100%; margin-top:6px;" onclick="addSubSubject()">Add Sub Subject</button>
        </div>
        <div class="skeleton-wrapper" id="subSubjectSkeleton"><div class="skeleton-box"></div></div>
        <div class="icon-grid" id="subSubjectList"></div>
    </div>

    <!-- 🧑‍🎓 SECTION 5: LIVE ATTENDANCE SHEET -->
    <div id="studentPage" class="page">
        <div id="ptrIndicator" class="ptr-element">⬇️ Pull Down to Sync Cloud Matrix</div>
        
        <button class="backBtn" onclick="backToSubSubjects()">⬅ Back to Chapters</button>
        <h2 id="subSubjectTitle" style="margin-top: 20px; font-weight:800; word-break: break-all;"></h2>
        
        <div class="stats-widget">📈 Submission Index Rate: <span id="statsChecked">0</span> / <span id="statsTotal">0</span> Checked</div>

        <div style="background: rgba(255,255,255,0.03); padding: 16px; border-radius: 16px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05);">
            <input type="text" id="studentNamesInput" placeholder="Bulk input names (e.g. Rahul, Aman, Karan, Vijay)">
            <div style="display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap;">
                <button class="primary" style="flex:1;" onclick="addStudentsText()">Bulk Register Profiles</button>
                <button class="excel-btn" style="flex:1;" onclick="triggerExcelFileSelector()">📁 Import Spreadsheet</button>
                <input type="file" id="excelHiddenFile" accept=".csv, .txt, .xlsx" style="display:none;" onchange="processExcelOrCsvUpload(this)">
            </div>
        </div>

        <div style="background: rgba(30,41,59,0.5); padding: 18px; border-radius: 16px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05);">
            <input type="text" id="localSearchInput" placeholder="🔍 Filter live record roster index..." oninput="refreshVirtualScroll()">
            <div style="margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap;">
                <button id="uncheckFilterBtn" class="toggleFilterBtn" onclick="toggleUncheckedFilter()">⚠️ Filter Unchecked</button>
                <button id="voiceBtn" class="voice-btn" onclick="toggleVoiceRecognition()">🎙️ Voice Stream Verify</button>
                <button class="pdf-btn" onclick="generatePremiumTabularPDF()">📄 Tabular PDF</button>
                <button class="whatsapp-btn" onclick="shareReportViaWhatsAppMatrix()">💬 WhatsApp Broadcast</button>
                <button class="primary" style="background:#7c3aed;" onclick="toggleNestedCalendarWidget()">📅 Historic Logs</button>
                <button class="primary" style="background:#eab308; color:#0f172a;" onclick="toggleChapterRankingWidget()">🏆 Leaderboard</button>
            </div>
            <div id="voiceStatus" style="font-size:13px; margin-top:8px; color:#f59e0b; display:none; font-weight:700;">Biometric Mic Feed Hooked...</div>
            <div id="nestedCalendarBox" class="calendar-nested-box" style="display:none;"></div>
            <div id="rankingBox" style="display:none;"></div>
        </div>

        <div class="skeleton-wrapper" id="studentSkeleton"><div class="skeleton-box"></div><div class="skeleton-box"></div><div class="skeleton-box"></div></div>
        <div id="virtual-scroll-viewport">
            <div id="virtual-scroll-spacer"></div>
            <div id="virtual-scroll-content"></div>
        </div>
    </div>

    <div id="cloudStatus">☁️ Cloud Node Status Offline</div>

    <!-- 🛠️ APPLICATION CORE LOGIC ENGINE -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAB77vRMD9FcIVsHXPU3c8lAsBR0HRLmcY",
            authDomain: "student-record-app-45ed3.firebaseapp.com",
            databaseURL: "https://student-record-app-45ed3-default-rtdb.firebaseio.com",
            projectId: "student-record-app-45ed3",
            storageBucket: "student-record-app-45ed3.appspot.com",
            messagingSenderId: "581800549444",
            appId: "1:581800549444:web:f86cec08754bbb1d58bec5",
            measurementId: "G-9QJPS5TDWF"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let data = {}; 
        let currentClass = ""; let currentSubject = ""; let currentSubSubject = "";
        let filterUncheckedOnly = false; let filteredStudentsList = [];
        let recognition = null; let isListening = false;
        let activeCloudUser = "";
        let audioCtx = null;
        let liveSubscriptionUnsubscribe = null;

        function getTodayString() {
            const d = new Date();
            return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
        }
        
        function getLiveTimestamp() {
            const d = new Date();
            return `${getTodayString()} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}:${String(d.getSeconds()).padStart(2, '0')}`;
        }

        function triggerSkeletonLoader(wrapperId, displayDuration) {
            const skeleton = document.getElementById(wrapperId);
            if(skeleton) {
                skeleton.style.display = "block";
                setTimeout(() => { skeleton.style.display = "none"; }, displayDuration);
            }
        }

        function playSound(type) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                if (type === 'check') {
                    osc.frequency.setValueAtTime(580, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.08);
                } else {
                    osc.frequency.setValueAtTime(220, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.12);
                }
            } catch(e){}
        }

        let touchStartPos = 0; let touchEndPos = 0;
        const ptrViewport = document.getElementById("virtual-scroll-viewport");
        const ptrIndicator = document.getElementById("ptrIndicator");

        ptrViewport.addEventListener('touchstart', (e) => {
            if(ptrViewport.scrollTop === 0) { touchStartPos = e.touches[0].clientY; }
        }, {passive: true});

        ptrViewport.addEventListener('touchmove', (e) => {
            if(ptrViewport.scrollTop === 0 && touchStartPos > 0) {
                touchEndPos = e.touches[0].clientY;
                let pullDistance = touchEndPos - touchStartPos;
                if(pullDistance > 10) {
                    ptrIndicator.classList.add("ptr-loading");
                    ptrIndicator.innerText = "🔄 Release to synchronize with Cloud Node...";
                }
            }
        }, {passive: true});

        ptrViewport.addEventListener('touchend', () => {
            if(ptrIndicator.classList.contains("ptr-loading")) {
                ptrIndicator.innerText = "⚡ Fetching real-time architecture...";
                if(activeCloudUser) {
                    setupRealtimeListener(activeCloudUser);
                }
                setTimeout(() => {
                    ptrIndicator.classList.remove("ptr-loading");
                    ptrIndicator.innerText = "⬇️ Pull Down to Sync Cloud Matrix";
                }, 1200);
            }
            touchStartPos = 0;
        });

        function calculateSubSubjectCompletionPercentage(className, subjectName, chapterName) {
            try {
                let chapterObj = data[className][subjectName][chapterName];
                if (!chapterObj || !chapterObj.students || chapterObj.students.length === 0) return 0;
                let today = getTodayString();
                let checkedCount = chapterObj.students.filter(s => s.dates.includes(today)).length;
                return Math.round((checkedCount / chapterObj.students.length) * 100);
            } catch(e) { return 0; }
        }

        function setupRealtimeListener(userDocId) {
            if (liveSubscriptionUnsubscribe) { liveSubscriptionUnsubscribe(); }
            document.getElementById("cloudStatus").innerText = "🔄 Establishing Live Sync...";
            
            liveSubscriptionUnsubscribe = db.collection("teachers_pwd").doc(userDocId)
                .onSnapshot((doc) => {
                    if (doc.exists) {
                        data = doc.data().schoolData || {};
                        document.getElementById("cloudStatus").innerText = "☁️ Realtime Sync: Active";
                        refreshActiveInterfaceViewports();
                    }
                }, (error) => {
                    document.getElementById("cloudStatus").innerText = "⚠️ Sync Error Lockout";
                });
        }

        function refreshActiveInterfaceViewports() {
            updateLiveVisualCounters();
            populateSearchDropdown();
            if (document.getElementById("home").classList.contains("active")) { renderClasses(); } 
            else if (document.getElementById("subjectPage").classList.contains("active")) { renderSubjects(); } 
            else if (document.getElementById("subSubjectPage").classList.contains("active")) { renderSubSubjects(); } 
            else if (document.getElementById("studentPage").classList.contains("active")) { refreshVirtualScroll(); }
        }

        async function updateCloudStorage() {
            if (!activeCloudUser) return;
            try {
                await db.collection("teachers_pwd").doc(activeCloudUser).update({ schoolData: data });
            } catch (err) {
                alert("Error synchronizing matrix cloud sequence: " + err.message);
            }
        }

        async function handleCloudAuth() {
            const user = document.getElementById("teacherUsername").value.trim();
            const pass = document.getElementById("teacherPassword").value.trim();
            if(!user || !pass) { alert("Please complete auth credentials."); return; }
            
            activeCloudUser = user.toLowerCase();
            const docRef = db.collection("teachers_pwd").doc(activeCloudUser);
            
            try {
                const snap = await docRef.get();
                if(snap.exists) {
                    if(snap.data().password === pass) {
                        data = snap.data().schoolData || {};
                        document.getElementById("welcomeTitle").innerText = `Welcome Node: ${activeCloudUser.toUpperCase()}`;
                        setupRealtimeListener(activeCloudUser);
                        showPage("home");
                    } else {
                        alert("Invalid credential token match.");
                    }
                } else {
                    if(confirm("User Node not detected. Register new profile on system?")) {
                        await docRef.set({ password: pass, schoolData: {} });
                        data = {};
                        document.getElementById("welcomeTitle").innerText = `Welcome Node: ${activeCloudUser.toUpperCase()}`;
                        setupRealtimeListener(activeCloudUser);
                        showPage("home");
                    }
                }
            } catch(e) {
                alert("Auth Transaction Failed: " + e.message);
            }
        }

        function logoutTeacher() {
            if (liveSubscriptionUnsubscribe) { liveSubscriptionUnsubscribe(); liveSubscriptionUnsubscribe = null; }
            activeCloudUser = ""; data = {};
            document.getElementById("teacherUsername").value = "";
            document.getElementById("teacherPassword").value = "";
            document.getElementById("cloudStatus").innerText = "☁️ Cloud Node Status Offline";
            showPage("login");
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            refreshActiveInterfaceViewports();
        }

        function toggleMode() { document.body.classList.toggle('light-mode'); }

        function addClass() {
            const name = document.getElementById("newClass").value.trim();
            if (!name) return;
            if (!data[name]) { data[name] = {}; updateCloudStorage(); }
            document.getElementById("newClass").value = "";
        }

        function renderClasses() {
            triggerSkeletonLoader("homeSkeleton", 400);
            const container = document.getElementById("classList");
            container.innerHTML = "";
            Object.keys(data).sort().forEach(cls => {
                const box = document.createElement("div");
                box.className = "icon-box";
                box.onclick = () => { currentClass = cls; showPage("subjectPage"); };
                
                let totalCheckedToday = 0; let totalStudents = 0;
                let today = getTodayString();
                if(data[cls]) {
                    Object.keys(data[cls]).forEach(sub => {
                        Object.keys(data[cls][sub]).forEach(ch => {
                            let chObj = data[cls][sub][ch];
                            if(chObj && chObj.students) {
                                totalStudents += chObj.students.length;
                                totalCheckedToday += chObj.students.filter(s => s.dates.includes(today)).length;
                            }
                        });
                    });
                }
                
                box.innerHTML = `
                    <div style='font-size:28px;'>🏫</div>
                    <b>${cls}</b>
                    <small style='color:#10b981;'>Live Count: ${totalCheckedToday}/${totalStudents}</small>
                    <button class='deleteBtn' style='padding:4px 8px; font-size:11px;' onclick='event.stopPropagation(); deleteClass("${cls}")'>Delete</button>
                `;
                container.appendChild(box);
            });
        }

        function deleteClass(cls) {
            if (confirm(`Purge entire dataset node for ${cls}?`)) { delete data[cls]; updateCloudStorage(); }
        }

        function goHome() { showPage("home"); }

        function addSubject() {
            const name = document.getElementById("newSubject").value.trim();
            if (!name || !currentClass) return;
            if (!data[currentClass][name]) { data[currentClass][name] = {}; updateCloudStorage(); }
            document.getElementById("newSubject").value = "";
        }

        function renderSubjects() {
            triggerSkeletonLoader("subjectSkeleton", 300);
            document.getElementById("classTitle").innerText = `Class Workspace: ${currentClass}`;
            const container = document.getElementById("subjectList");
            container.innerHTML = "";
            if (!data[currentClass]) return;
            Object.keys(data[currentClass]).sort().forEach(sub => {
                const box = document.createElement("div");
                box.className = "icon-box";
                box.onclick = () => { currentSubject = sub; showPage("subSubjectPage"); };
                box.innerHTML = `
                    <div style='font-size:28px;'>📘</div>
                    <b>${sub}</b>
                    <button class='deleteBtn' style='padding:4px 8px; font-size:11px;' onclick='event.stopPropagation(); deleteSubject("${sub}")'>Delete</button>
                `;
                container.appendChild(box);
            });
        }

        function deleteSubject(sub) {
            if (confirm(`Delete subject node: ${sub}?`)) { delete data[currentClass][sub]; updateCloudStorage(); }
        }

        function backToSubjects() { showPage("subjectPage"); }

        function addSubSubject() {
            const name = document.getElementById("newSubSubject").value.trim();
            if (!name || !currentClass || !currentSubject) return;
            if (!data[currentClass][currentSubject][name]) {
                data[currentClass][currentSubject][name] = { students: [], historyLogs: {} };
                updateCloudStorage();
            }
            document.getElementById("newSubSubject").value = "";
        }

        function renderSubSubjects() {
            triggerSkeletonLoader("subSubjectSkeleton", 300);
            document.getElementById("subjectTitle").innerText = `${currentClass} ➔ ${currentSubject}`;
            const container = document.getElementById("subSubjectList");
            container.innerHTML = "";
            if (!data[currentClass] || !data[currentClass][currentSubject]) return;
            Object.keys(data[currentClass][currentSubject]).sort().forEach(subSub => {
                const box = document.createElement("div");
                box.className = "icon-box";
                box.onclick = () => { currentSubSubject = subSub; showPage("studentPage"); };
                
                let percentage = calculateSubSubjectCompletionPercentage(currentClass, currentSubject, subSub);
                
                box.innerHTML = `
                    <div style='font-size:28px;'>📖</div>
                    <b>${subSub}</b>
                    <span class="progress-tag">Progress: ${percentage}%</span>
                    <button class='deleteBtn' style='padding:4px 8px; font-size:11px;' onclick='event.stopPropagation(); deleteSubSubject("${subSub}")'>Delete</button>
                `;
                container.appendChild(box);
            });
        }

        function deleteSubSubject(subSub) {
            if (confirm(`Delete chapter node: ${subSub}?`)) { delete data[currentClass][currentSubject][subSub]; updateCloudStorage(); }
        }

        function backToSubSubjects() { showPage("subSubjectPage"); }

        function getActiveChapterStudentsArray() {
            try { return data[currentClass][currentSubject][currentSubSubject].students || []; } catch(e) { return []; }
        }

        function addStudentsText() {
            const input = document.getElementById("studentNamesInput").value.trim();
            if (!input) return;
            let names = input.split(",").map(n => n.trim()).filter(n => n.length > 0);
            let targetArray = getActiveChapterStudentsArray();
            names.forEach(name => {
                if (!targetArray.some(s => s.name.toLowerCase() === name.toLowerCase())) {
                    targetArray.push({ name: name, dates: [], timestamps: {}, streak: 0 });
                }
            });
            data[currentClass][currentSubject][currentSubSubject].students = targetArray;
            updateCloudStorage();
            document.getElementById("studentNamesInput").value = "";
        }

        function triggerExcelFileSelector() { document.getElementById("excelHiddenFile").click(); }

        function processExcelOrCsvUpload(inputEl) {
            const file = inputEl.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                let lines = text.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0);
                let targetArray = getActiveChapterStudentsArray();
                lines.forEach(line => {
                    let cleanedName = line.replace(/["']/g, "").trim();
                    if(cleanedName && !targetArray.some(s => s.name.toLowerCase() === cleanedName.toLowerCase())) {
                        targetArray.push({ name: cleanedName, dates: [], timestamps: {}, streak: 0 });
                    }
                });
                data[currentClass][currentSubject][currentSubSubject].students = targetArray;
                updateCloudStorage();
                alert(`Successfully processed spreadsheet row fields!`);
            };
            reader.readAsText(file);
            inputEl.value = "";
        }

        function toggleUncheckedFilter() {
            filterUncheckedOnly = !filterUncheckedOnly;
            const btn = document.getElementById("uncheckFilterBtn");
            if(filterUncheckedOnly) {
                btn.innerText = "⭐ Show All Roster";
                btn.style.background = "#ef4444"; btn.style.color = "white";
            } else {
                btn.innerText = "⚠️ Filter Unchecked";
                btn.style.background = "#eab308"; btn.style.color = "#0f172a";
            }
            refreshVirtualScroll();
        }

        function updateLiveVisualCounters() {
            let students = getActiveChapterStudentsArray();
            let today = getTodayString();
            let checked = students.filter(s => s.dates.includes(today)).length;
            document.getElementById("statsChecked").innerText = checked;
            document.getElementById("statsTotal").innerText = students.length;
        }

        const ROW_HEIGHT = 90;
        const viewport = document.getElementById("virtual-scroll-viewport");
        const spacer = document.getElementById("virtual-scroll-spacer");
        const content = document.getElementById("virtual-scroll-content");

        viewport.addEventListener("scroll", () => { renderVirtualRows(); });

        function refreshVirtualScroll() {
            let students = getActiveChapterStudentsArray();
            let searchVal = document.getElementById("localSearchInput").value.toLowerCase().trim();
            let today = getTodayString();

            filteredStudentsList = students.filter(s => {
                let matchesSearch = s.name.toLowerCase().includes(searchVal);
                if (filterUncheckedOnly) {
                    return matchesSearch && !s.dates.includes(today);
                }
                return matchesSearch;
            }).sort((a,b) => a.name.localeCompare(b.name));

            spacer.style.height = `${filteredStudentsList.length * ROW_HEIGHT}px`;
            updateLiveVisualCounters();
            renderVirtualRows();
        }

        function renderVirtualRows() {
            const scrollTop = viewport.scrollTop;
            const viewportHeight = viewport.clientHeight;
            
            let startIndex = Math.floor(scrollTop / ROW_HEIGHT) - 2;
            let endIndex = Math.ceil((scrollTop + viewportHeight) / ROW_HEIGHT) + 2;
            
            if (startIndex < 0) startIndex = 0;
            if (endIndex > filteredStudentsList.length) endIndex = filteredStudentsList.length;
            
            content.style.transform = `translateY(${startIndex * ROW_HEIGHT}px)`;
            content.innerHTML = "";
            
            let today = getTodayString();

            for (let i = startIndex; i < endIndex; i++) {
                let student = filteredStudentsList[i];
                let isChecked = student.dates.includes(today);
                
                let lastStamp = student.timestamps[today] || "N/A";
                let verifiedMarker = isChecked ? `<span style="color:#10b981; font-weight:bold;">[CHECKED]</span>` : `<span style="color:#ef4444; font-weight:bold;">[PENDING]</span>`;
                
                let row = document.createElement("div");
                row.className = "student-row";
                row.style.height = `${ROW_HEIGHT}px`;
                
                row.innerHTML = `
                    <div class="student-info">
                        <b>${student.name} ${student.streak > 1 ? `<span class="streak-badge">🔥 ${student.streak}</span>` : ''}</b>
                        <small>Status: ${verifiedMarker}</small>
                        <small style="opacity:0.6;">Time Stamp: ${lastStamp}</small>
                    </div>
                    <div class="student-actions">
                        ${isChecked ? 
                            `<button class="uncheckBtn" onclick="toggleStudentStatus('${student.name}', false)">Reset</button>` : 
                            `<button class="checkedBtn" onclick="toggleStudentStatus('${student.name}', true)">Verify</button>`
                        }
                        <button class="deleteBtn" style="padding:10px;" onclick="removeStudentProfile('${student.name}')">🗑️</button>
                    </div>
                `;
                content.appendChild(row);
            }
        }

        function toggleStudentStatus(name, markChecked) {
            let students = getActiveChapterStudentsArray();
            let idx = students.findIndex(s => s.name === name);
            if(idx === -1) return;
            
            let today = getTodayString();
            let stamp = getLiveTimestamp();
            
            if(markChecked) {
                if(!students[idx].dates.includes(today)) {
                    students[idx].dates.push(today);
                    students[idx].timestamps[today] = stamp;
                    students[idx].streak = (students[idx].streak || 0) + 1;
                    playSound('check');
                }
            } else {
                students[idx].dates = students[idx].dates.filter(d => d !== today);
                delete students[idx].timestamps[today];
                students[idx].streak = Math.max(0, (students[idx].streak || 1) - 1);
                playSound('uncheck');
            }
            
            data[currentClass][currentSubject][currentSubSubject].students = students;
            
            if(!data[currentClass][currentSubject][currentSubSubject].historyLogs) {
                data[currentClass][currentSubject][currentSubSubject].historyLogs = {};
            }
            data[currentClass][currentSubject][currentSubSubject].historyLogs[today] = students.filter(s => s.dates.includes(today)).map(s => s.name);
            
            updateCloudStorage();
        }

        function removeStudentProfile(name) {
            if(confirm(`Purge profile record for ${name}?`)) {
                let students = getActiveChapterStudentsArray();
                students = students.filter(s => s.name !== name);
                data[currentClass][currentSubject][currentSubSubject].students = students;
                updateCloudStorage();
            }
        }

        function toggleVoiceRecognition() {
            if (isListening) {
                stopVoiceStream();
            } else {
                startVoiceStream();
            }
        }

        function startVoiceStream() {
            window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!window.SpeechRecognition) { alert("Speech architecture unsupported."); return; }
            
            recognition = new window.SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'en-US';
            
            recognition.onstart = () => {
                isListening = true;
                const btn = document.getElementById("voiceBtn");
                btn.innerText = "🛑 Stop Streaming";
                btn.classList.add("voice-active");
                document.getElementById("voiceStatus").style.display = "block";
            };
            
            recognition.onresult = (event) => {
                let lastIndex = event.results.length - 1;
                let text = event.results[lastIndex][0].transcript.toLowerCase().trim();
                text = text.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");
                
                let students = getActiveChapterStudentsArray();
                students.forEach(st => {
                    if(text.includes(st.name.toLowerCase())) {
                        toggleStudentStatus(st.name, true);
                    }
                });
            };
            
            recognition.onerror = (e) => { stopVoiceStream(); };
            recognition.onend = () => { stopVoiceStream(); };
            recognition.start();
        }

        function stopVoiceStream() {
            isListening = false;
            if(recognition) { recognition.stop(); recognition = null; }
            const btn = document.getElementById("voiceBtn");
            btn.innerText = "🎙️ Voice Stream Verify";
            btn.classList.remove("voice-active");
            document.getElementById("voiceStatus").style.display = "none";
        }

        function toggleChapterRankingWidget() {
            const box = document.getElementById("rankingBox");
            if(box.style.display === "block") { box.style.display = "none"; return; }
            
            let students = getActiveChapterStudentsArray();
            if(students.length === 0) { box.innerHTML = "<b>No data registered to calculate ranks.</b>"; box.style.display = "block"; return; }
            
            let sorted = [...students].sort((a,b) => (b.streak || 0) - (a.streak || 0));
            
            let html = `<h3 style='margin-top:0; color:#eab308;'>🏆 Roster Retention Leaderboard</h3>`;
            sorted.forEach((st, index) => {
                html += `<div class='rankItem'><b>#${index+1} ${st.name}</b> — Consistency Power: <span style='color:#10b981; font-weight:bold;'>${st.streak || 0} Days</span></div>`;
            });
            box.innerHTML = html;
            box.style.display = "block";
        }

        function toggleNestedCalendarWidget() {
            const box = document.getElementById("nestedCalendarBox");
            if(box.style.display === "block") { box.style.display = "none"; return; }
            
            let chapterObj = data[currentClass][currentSubject][currentSubSubject] || {};
            let logs = chapterObj.historyLogs || {};
            
            let html = `<h3 style='margin-top:0; color:#7c3aed;'>📅 Chronological Sync Log Indexes</h3>`;
            let datesArr = Object.keys(logs).sort((a,b) => {
                let p1 = a.split("/").reverse().join("-");
                let p2 = b.split("/").reverse().join("-");
                return p2.localeCompare(p1);
            });
            
            if(datesArr.length === 0) { html += `<p style='opacity:0.6;'>No chronological matrix items archived.</p>`; }
            
            datesArr.forEach(dt => {
                html += `
                    <div style='margin-bottom:12px; background:rgba(0,0,0,0.15); padding:10px; border-radius:8px;'>
                        <b style='color:#60a5fa;'>Date Field: ${dt}</b>
                        <div style='font-size:13px; margin-top:4px; opacity:0.9;'>Verified Submissions (${logs[dt].length}): ${logs[dt].join(", ") || 'None'}</div>
                    </div>
                `;
            });
            box.innerHTML = html;
            box.style.display = "block";
        }

        function generatePremiumTabularPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            let today = getTodayString();
            doc.setFillColor(15, 23, 42); doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255, 255, 255); doc.setFontSize(22); doc.text("STUDENT RECORD METRIC SYSTEM", 14, 20);
            doc.setFontSize(11); doc.text(`Generation Date/Time Stamp: ${getLiveTimestamp()}`, 14, 32);
            
            doc.setTextColor(15, 23, 42); doc.setFontSize(12);
            doc.text(`Class Channel: ${currentClass}`, 14, 50);
            doc.text(`Subject Field: ${currentSubject}`, 14, 56);
            doc.text(`Chapter Module: ${currentSubSubject}`, 14, 62);
            
            let tableData = filteredStudentsList.map((st, i) => {
                let status = st.dates.includes(today) ? "CHECKED" : "UNCHECKED";
                let time = st.timestamps[today] || "N/A";
                return [i+1, st.name, status, time, `${st.streak || 0} Days`];
            });
            
            doc.autoTable({
                startY: 70,
                head: [['Index', 'Student Identity Name', 'Verification Status', 'Log Timestamp', 'Retention Count']],
                body: tableData,
                theme: 'grid',
                headStyles: { fillColor: [59, 130, 246] },
                styles: { fontSize: 10 }
            });
            
            doc.save(`Record_${currentClass}_${currentSubSubject}_${today}.pdf`);
        }

        function generateCompleteClassMatrixPDF_Option2() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            let today = getTodayString();
            
            doc.setFillColor(30, 41, 59); doc.rect(0, 0, 297, 35, 'F');
            doc.setTextColor(255, 255, 255); doc.setFontSize(24); doc.text("CLASS TRACKING METRIX MATRIX", 14, 18);
            doc.setFontSize(11); doc.text(`Class Target Context: ${currentClass} | Generated Node: ${getLiveTimestamp()}`, 14, 28);
            
            let subjectsObj = data[currentClass] || {};
            let chaptersList = [];
            Object.keys(subjectsObj).forEach(subKey => {
                Object.keys(subjectsObj[subKey]).forEach(chKey => {
                    chaptersList.push({ subject: subKey, chapter: chKey });
                });
            });
            
            let allStudentNamesMap = new Set();
            chaptersList.forEach(node => {
                let students = subjectsObj[node.subject][node.chapter].students || [];
                students.forEach(s => allStudentNamesMap.add(s.name));
            });
            
            let uniqueStudentsArray = Array.from(allStudentNamesMap).sort();
            
            if(chaptersList.length === 0 || uniqueStudentsArray.length === 0) {
                alert("Insufficient multi-dimensional matrix variables to evaluate grid."); return;
            }
            
            let headers = ['Student Name Profile'];
            chaptersList.forEach(node => {
                headers.push(`${node.subject}\n(${node.chapter})`);
            });
            
            let bodyRows = [];
            uniqueStudentsArray.forEach(name => {
                let row = [name];
                chaptersList.forEach(node => {
                    let studentArr = subjectsObj[node.subject][node.chapter].students || [];
                    let match = studentArr.find(s => s.name === name);
                    if(match) {
                        row.push(match.dates.includes(today) ? 'CHECKED' : 'UNCHECKED');
                    } else {
                        row.push('-');
                    }
                });
                bodyRows.push(row);
            });
            
            doc.autoTable({
                startY: 45,
                head: [headers],
                body: bodyRows,
                theme: 'grid',
                headStyles: { fillColor: [16, 185, 129], fontSize: 8, halign: 'center' },
                styles: { fontSize: 9, cellPadding: 2 },
                columnStyles: { 0: { fontStyle: 'bold', width: 45 } }
            });
            
            doc.save(`Matrix_Sheet_${currentClass}_${today}.pdf`);
        }

        function shareReportViaWhatsAppMatrix() {
            let today = getTodayString();
            let msg = `*STUDENT RECORD METRIC SYSTEM STATUS REPORT*\n`;
            msg += `*Date Window:* ${today}\n`;
            msg += `*Class Index:* ${currentClass}\n`;
            msg += `*Chapter Field:* ${currentSubSubject}\n`;
            msg += `-------------------------------------------\n`;
            
            filteredStudentsList.forEach((s, idx) => {
                let state = s.dates.includes(today) ? "✅ CHECKED" : "❌ UNCHECKED";
                msg += `${idx + 1}. ${s.name} ➔ ${state}\n`;
            });
            
            let url = `https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`;
            window.open(url, '_blank');
        }

        function populateSearchDropdown() {
            const dropdown = document.getElementById("searchClassDropdown");
            if(!dropdown) return;
            dropdown.innerHTML = `<option value="">-- Select Class Channel --</option>`;
            Object.keys(data).sort().forEach(cls => {
                let opt = document.createElement("option");
                opt.value = cls; opt.innerText = cls;
                dropdown.appendChild(opt);
            });
        }

        function clearSearchOutputFields() {
            document.getElementById("globalSearchResultDisplay").innerHTML = "";
            document.getElementById("globalSearchResultDisplay").style.display = "none";
        }

        function executeGlobalStudentSearch() {
            const targetClass = document.getElementById("searchClassDropdown").value;
            const targetName = document.getElementById("searchStudentName").value.trim().toLowerCase();
            const displayNode = document.getElementById("globalSearchResultDisplay");
            
            if(!targetClass || !targetName) {
                alert("Please select both target class node and profile text string query."); return;
            }
            
            displayNode.innerHTML = "";
            displayNode.style.display = "block";
            
            let classData = data[targetClass] || {};
            let matchFound = false;
            let finalHtmlOutput = `<h4 style='margin:0 0 8px 0; color:#60a5fa;'>Logs Compiled for Name Query: "${targetName}"</h4>`;
            
            Object.keys(classData).forEach(subKey => {
                Object.keys(classData[subKey]).forEach(chKey => {
                    let studentsArr = classData[subKey][chKey].students || [];
                    let foundStudent = studentsArr.find(s => s.name.toLowerCase() === targetName);
                    
                    if(foundStudent) {
                        matchFound = true;
                        let checkedDatesStr = foundStudent.dates.length > 0 ? foundStudent.dates.join(", ") : "Zero Log Entries Saved";
                        finalHtmlOutput += `
                            <div style='border-bottom: 1px solid rgba(255,255,255,0.1); padding:6px 0;'>
                                <b>Subject:</b> ${subKey} | <b>Chapter:</b> ${chKey}<br>
                                <small style='color:#eab308;'>Streak Score: ${foundStudent.streak || 0} Days</small><br>
                                <small style='opacity:0.8;'>Archived Log Dates: ${checkedDatesStr}</small>
                            </div>
                        `;
                    }
                });
            });
            
            if(!matchFound) {
                finalHtmlOutput += `<p style='opacity:0.6; font-size:13px;'>No specific match identified within "${targetClass}" architecture.</p>`;
            }
            
            displayNode.innerHTML = finalHtmlOutput;
        }

        window.onload = () => {
            document.getElementById("cloudStatus").innerText = "☁️ System Initialized Offline";
        };
    </script>
</body>
